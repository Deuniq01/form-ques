<script type="text/babel">
const { useState, useRef } = React;

/* ╔══════════════════════════════════════════════════════╗
   ║  PASTE YOUR GOOGLE APPS SCRIPT WEB APP URL BELOW    ║

const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbytwpxgdI1az95v6MkUyimpTwGWAUwT9tX4fIoVBXraMtepVxIquNSKOf9jNCssPFpY-A/exec";
/* ════════════════════════════════════════════════════════ */

const isConfigured = () => SCRIPT_URL && !SCRIPT_URL.includes("PASTE");

async function saveToSheet(entry) {
  // Flatten all answers into one ordered row
  const row = [
    new Date().toLocaleString(),
    entry.A.gender, entry.A.age, entry.A.education, entry.A.jobPosition, entry.A.jobPositionOther,
    entry.A.yearsExperience, entry.A.hotelType, entry.A.workSchedule, entry.A.formalTraining,
    entry.A.trainingRecency, entry.A.writtenGuidelines, entry.A.handleFood,
    entry.B.useSocialMedia, (entry.B.platforms||[]).join("; "), entry.B.frequency, entry.B.dailyTime,
    entry.B.duringBreaks, entry.B.followFoodPages, entry.B.followInfluencers, entry.B.seenFoodSafety,
    entry.B.frequencyFoodSafety, entry.B.contentFormat, entry.B.searchFoodSafety,
    entry.B.savedShared, entry.B.trustInfo, entry.B.preferSocialMedia,
    entry.C.c1, entry.C.c2, entry.C.c3, entry.C.c4, entry.C.c5, entry.C.c6, entry.C.c7, entry.C.c8,
    entry.D.d1, entry.D.d2, entry.D.d3, entry.D.d4, entry.D.d5,
    entry.D.d6, entry.D.d7, entry.D.d8, entry.D.d9, entry.D.d10,
    entry.E.e1, entry.E.e2, entry.E.e3, entry.E.e4, entry.E.e5,
    entry.E.e6, entry.E.e7, entry.E.e8, entry.E.e9, entry.E.e10,
    entry.F.f1, entry.F.f2, entry.F.f3, entry.F.f4, entry.F.f5,
    entry.F.f6, entry.F.f7, entry.F.f8, entry.F.f9,
    entry.G.g1, entry.G.g2, entry.G.g3, entry.G.g4, entry.G.g5,
    entry.G.g6, entry.G.g7, entry.G.g8, entry.G.g9, entry.G.g10
  ];

  const res = await fetch(SCRIPT_URL, {
    method: "POST",
    headers: { "Content-Type": "text/plain" },
    body: JSON.stringify({ row })
  });
  if (!res.ok) throw new Error(`HTTP ${res.status}`);
  const json = await res.json();
  if (json.status !== "ok") throw new Error(json.message || "Unknown error");
}

/* ─── Section config ─── */

  B: { title: "Section B: Social Media Exposure and Usage", color: "#1b3a4b", accent: "#48cae4" },

function validate(d) {
  const e={};
  if(!d.A.gender)e["A.gender"]=1; if(!d.A.age)e["A.age"]=1;
  if(!d.A.education)e["A.education"]=1; if(!d.A.jobPosition)e["A.jobPosition"]=1;
  if(d.A.jobPosition==="Other"&&!d.A.jobPositionOther.trim())e["A.jobPositionOther"]=1;
  if(!d.A.yearsExperience)e["A.yearsExperience"]=1; if(!d.A.hotelType)e["A.hotelType"]=1;
  if(!d.A.workSchedule)e["A.workSchedule"]=1; if(!d.A.formalTraining)e["A.formalTraining"]=1;
  if(d.A.formalTraining==="Yes"&&!d.A.trainingRecency)e["A.trainingRecency"]=1;
  if(!d.A.writtenGuidelines)e["A.writtenGuidelines"]=1; if(!d.A.handleFood)e["A.handleFood"]=1;
  if(!d.B.useSocialMedia)e["B.useSocialMedia"]=1; if(!d.B.platforms.length)e["B.platforms"]=1;
  if(!d.B.frequency)e["B.frequency"]=1; if(!d.B.dailyTime)e["B.dailyTime"]=1;
  if(!d.B.duringBreaks)e["B.duringBreaks"]=1; if(!d.B.followFoodPages)e["B.followFoodPages"]=1;
  if(!d.B.followInfluencers)e["B.followInfluencers"]=1; if(!d.B.seenFoodSafety)e["B.seenFoodSafety"]=1;
  if(!d.B.frequencyFoodSafety)e["B.frequencyFoodSafety"]=1; if(!d.B.contentFormat)e["B.contentFormat"]=1;
  if(!d.B.searchFoodSafety)e["B.searchFoodSafety"]=1; if(!d.B.savedShared)e["B.savedShared"]=1;
  if(!d.B.trustInfo)e["B.trustInfo"]=1; if(!d.B.preferSocialMedia)e["B.preferSocialMedia"]=1;
  Object.keys(d.C).forEach(k=>{if(!d.C[k])e[`C.${k}`]=1;});
  Object.keys(d.D).forEach(k=>{if(!d.D[k])e[`D.${k}`]=1;});
  Object.keys(d.E).forEach(k=>{if(!d.E[k])e[`E.${k}`]=1;});
  Object.keys(d.F).forEach(k=>{if(!d.F[k])e[`F.${k}`]=1;});
  Object.keys(d.G).forEach(k=>{if(!d.G[k])e[`G.${k}`]=1;});
  return e;
}

/* ─── UI components ─── */
function Radio({ name, options, value, onChange, inline=true, hasError, accent="#52b788" }) {
  return (
    <div>
      <div style={{display:"flex",flexWrap:"wrap",gap:inline?"16px":"10px",marginTop:6}}>
        {options.map(o=>(
          <label key={o} style={{display:"flex",alignItems:"center",gap:6,cursor:"pointer",fontSize:14,color:"#e0e0e0"}}>
            <input type="radio" name={name} checked={value===o} onChange={()=>onChange(o)} style={{accentColor:accent,width:16,height:16}}/>
            {o}
          </label>
        ))}
      </div>
      {hasError&&<p style={{color:"#ff6b6b",fontSize:12,marginTop:5}}>⚠ This question is required.</p>}
    </div>
  );
}

function Checks({ options, selected, onChange, hasError, accent="#48cae4" }) {
  return (
    <div>
      <div style={{display:"flex",flexWrap:"wrap",gap:"12px",marginTop:6}}>

          <label key={o} style={{display:"flex",alignItems:"center",gap:6,cursor:"pointer",fontSize:14,color:"#e0e0e0"}}>

      </div>
      {hasError&&<p style={{color:"#ff6b6b",fontSize:12,marginTop:5}}>⚠ Please select at least one platform.</p>}

}

function Likert({ questions, values, onChange, scale, accent, errors, pfx }) {
  return (
    <div style={{overflowX:"auto"}}>
      <table style={{width:"100%",borderCollapse:"collapse",fontSize:13}}>

          <tr>
            <th style={{textAlign:"left",padding:"10px 12px",color:accent,width:"52%",borderBottom:`2px solid ${accent}40`}}>Statement</th>

          </tr>
        </thead>
        <tbody>
          {questions.map((q,i)=>{
            const k=`${pfx}${i+1}`, err=errors&&errors[k];
            return (
              <tr key={i} style={{borderBottom:`1px solid ${err?"#ff6b6b40":"#ffffff10"}`,background:err?"#2a0a0a":"transparent"}}>
                <td style={{padding:"12px",color:err?"#ffaaaa":"#d0d0d0",lineHeight:1.5}}>

                </td>
                {scale.map(s=>(
                  <td key={s} style={{textAlign:"center",padding:"12px 6px"}}>

                  </td>
                ))}
              </tr>
            );
          })}
        </tbody>
      </table>

  );
}

}

function Field({ label, children, hasError }) {

/* ══════════════════ MAIN APP ══════════════════ */
function App() {
  const [data, setData] = useState(emptyData());
  const [errors, setErrors] = useState({});
  const [tried, setTried] = useState(false);
  const [saveStatus, setSaveStatus] = useState("idle"); // idle | saving | success | error
  const [saveMsg, setSaveMsg] = useState("");
  const [submitCount, setSubmitCount] = useState(0);
  const topRef = useRef(null);

  const upA=(k,v)=>{setData(d=>({...d,A:{...d.A,[k]:v}}));setErrors(e=>{const n={...e};delete n[`A.${k}`];return n;});};
  const upB=(k,v)=>{setData(d=>({...d,B:{...d.B,[k]:v}}));setErrors(e=>{const n={...e};delete n[`B.${k}`];return n;});};
  const upC=(k,v)=>{setData(d=>({...d,C:{...d.C,[k]:v}}));setErrors(e=>{const n={...e};delete n[`C.${k}`];return n;});};
  const upF=(k,v)=>{setData(d=>({...d,F:{...d.F,[k]:v}}));setErrors(e=>{const n={...e};delete n[`F.${k}`];return n;});};
  const upG=(k,v)=>{setData(d=>({...d,G:{...d.G,[k]:v}}));setErrors(e=>{const n={...e};delete n[`G.${k}`];return n;});};
  const upL=(sec,i,v)=>{
    const k=`${sec.toLowerCase()}${i+1}`;
    setData(d=>({...d,[sec]:{...d[sec],[k]:v}}));
    setErrors(e=>{const n={...e};delete n[`${sec}.${k}`];return n;});
  };

  const handleSubmit = async () => {
    setTried(true);
    const errs = validate(data);
    setErrors(errs);
    if(Object.keys(errs).length > 0) {
      setTimeout(()=>{ const el=document.querySelector("[data-ferr='1']"); if(el)el.scrollIntoView({behavior:"smooth",block:"center"}); },80);
      return;
    }

    setSaveStatus("saving"); setSaveMsg("");

    if(!isConfigured()) {
      setSaveStatus("success");
      setSaveMsg("⚠️ Google Sheets not connected yet — see setup instructions above.");
      setSubmitCount(c=>c+1);
      setTimeout(()=>setSaveStatus("idle"),5000);
      setTried(false); setErrors({}); setData(emptyData());
      if(topRef.current) topRef.current.scrollIntoView({behavior:"smooth"});
      return;
    }

    try {
      await saveToSheet(data);
      setSaveStatus("success");
      setSaveMsg("✅ Response saved to Google Sheets!");
      setSubmitCount(c=>c+1);
      setTimeout(()=>{setSaveStatus("idle");setSaveMsg("");},5000);
      setTried(false); setErrors({}); setData(emptyData());
      if(topRef.current) topRef.current.scrollIntoView({behavior:"smooth"});
    } catch(err) {
      setSaveStatus("error");
      setSaveMsg(`❌ Save failed: ${err.message}`);
    }
  };

  const errCount=Object.keys(errors).length;
  const secErr=s=>Object.keys(errors).some(k=>k.startsWith(s+"."));
  const configured=isConfigured();

  const dLikert=["Social media exposes me to food safety information.","I am aware of hygiene practices through social media.","Social media has increased my awareness of food contamination risks.","I have learned about cross-contamination online.","I have seen content on handwashing and personal hygiene.","I have learned about temperature control from social media.","Social media improves my understanding of foodborne diseases.","I can recall food safety tips learned online.","Social media food safety messages are easy to understand.","Social media keeps me updated on food safety information."];
  const eLikert=["I apply food safety tips learned online at work.","Social media has changed how I handle food.","I wash my hands more frequently due to information seen online.","I use protective clothing more consistently after learning online.","I am more careful about food storage because of social media.","Social media influences my hygiene behaviour positively.","I discuss food safety tips from social media with colleagues.","I correct unsafe practices using information learned online.","Online food safety messages influence my daily work routine.","My food safety habits have improved due to social media."];
  const gLikert=["Social media is effective for food safety education.","Hotels should use social media for staff food safety training.","Social media complements formal food safety training.","Verified food safety pages should be promoted.","Short food safety videos are more effective than long lectures.","Government agencies should regulate food safety content online.","Hotels should include social media learning in their policies.","Staff should be trained to identify false food safety information online.","Social media improves overall food safety culture in hotels.","Social media will play a bigger role in future food safety training."];
  const L4=["Strongly Agree","Agree","Disagree","Strongly Disagree"];

  return (
    <div ref={topRef} style={{padding:"40px 20px",minHeight:"100vh"}}>

      {/* HEADER */}
      <div style={{maxWidth:820,margin:"0 auto 24px"}}>
        <div className="hpad" style={{background:"linear-gradient(135deg,#0d2137,#0f2b1e)",border:"1px solid #52b78840",borderRadius:20,padding:"36px 40px",textAlign:"center",boxShadow:"0 8px 40px #00000060"}}>
          <p style={{color:"#52b788",fontSize:12,letterSpacing:3,textTransform:"uppercase",marginBottom:8}}>Federal University of Agriculture, Abeokuta</p>
          <h1 style={{color:"#fff",fontFamily:"'Playfair Display',serif",fontSize:26,lineHeight:1.4,marginBottom:12}}>Influence of Social Media on<br/>Food Safety Practices</h1>
          <p style={{color:"#a0b0c0",fontSize:13}}>Department of Hospitality and Tourism Management &nbsp;·&nbsp; Researcher: John Blessing Deborah</p>
        </div>

        {/* Status pill */}
        <div style={{display:"flex",justifyContent:"center",marginTop:10,gap:12,flexWrap:"wrap"}}>
          <span style={{fontSize:12,padding:"5px 16px",borderRadius:20,background:"#0a1628",color:configured?"#52b788":"#fca311",border:`1px solid ${configured?"#52b78840":"#fca31140"}`}}>
            {configured?"✅ Google Sheets Connected":"⚠️ Google Sheets Not Connected"}
          </span>
          {submitCount>0&&<span style={{fontSize:12,padding:"5px 16px",borderRadius:20,background:"#0a1628",color:"#48cae4",border:"1px solid #48cae440"}}>
            📊 {submitCount} response{submitCount!==1?"s":""} submitted this session
          </span>}
        </div>
      </div>

      <div style={{maxWidth:820,margin:"0 auto"}}>

        {/* Status banner */}
        {saveMsg&&(
          <div style={{background:saveStatus==="error"?"#2a0a0a":saveStatus==="saving"?"#0a1a2a":"#1a3a2a",border:`1px solid ${saveStatus==="error"?"#ff6b6b":saveStatus==="saving"?"#48cae4":"#52b788"}`,borderRadius:12,padding:"14px 24px",marginBottom:20,color:saveStatus==="error"?"#ff6b6b":saveStatus==="saving"?"#48cae4":"#52b788",fontSize:14,textAlign:"center",fontWeight:500}}>
            {saveStatus==="saving"&&"⏳ "}{saveMsg}
          </div>
        )}

        {/* Setup banner */}
        {!configured&&<SetupBanner/>}

        {/* Validation error banner */}
        {tried&&errCount>0&&(
          <div data-ferr="1" style={{background:"#2a0a0a",border:"1px solid #ff6b6b",borderRadius:12,padding:"16px 24px",marginBottom:24,color:"#ff6b6b",fontWeight:500,fontSize:15,textAlign:"center"}}>
            ⚠ <strong>{errCount} question{errCount!==1?"s":""}</strong> still unanswered — incomplete sections are highlighted in red.
          </div>
        )}

        {/* ── SECTION A ── */}
        <Card section="A" hasErrors={secErr("A")}>
          <div className="grid-2" style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:20}}>
            <Field label="1. Gender" hasError={errors["A.gender"]}><Radio name="gender" options={["Male","Female"]} value={data.A.gender} onChange={v=>upA("gender",v)} hasError={errors["A.gender"]} accent={SECTIONS.A.accent}/></Field>
            <Field label="2. Age" hasError={errors["A.age"]}><Radio name="age" options={["18–25","26–35","36–45","46 and above"]} value={data.A.age} onChange={v=>upA("age",v)} hasError={errors["A.age"]} accent={SECTIONS.A.accent}/></Field>
          </div>
          <Field label="3. Educational Qualification" hasError={errors["A.education"]}><Radio name="edu" options={["SSCE","ND/NCE","HND/B.Sc","Postgraduate"]} value={data.A.education} onChange={v=>upA("education",v)} hasError={errors["A.education"]} accent={SECTIONS.A.accent}/></Field>
          <Field label="4. Job Position" hasError={errors["A.jobPosition"]}>
            <Radio name="job" options={["Manager","Chef/Cook","Kitchen Assistant","Waiter/Waitress","Other"]} value={data.A.jobPosition} onChange={v=>upA("jobPosition",v)} hasError={errors["A.jobPosition"]} accent={SECTIONS.A.accent}/>
            {data.A.jobPosition==="Other"&&<div style={{marginTop:8}}><input placeholder="Please specify…" value={data.A.jobPositionOther} onChange={e=>upA("jobPositionOther",e.target.value)} style={{padding:"8px 12px",background:"#1a2a3a",border:`1px solid ${errors["A.jobPositionOther"]?"#ff6b6b":"#ffffff30"}`,borderRadius:8,color:"#e0e0e0",fontSize:13,width:"100%",fontFamily:"'DM Sans',sans-serif"}}/>{errors["A.jobPositionOther"]&&<p style={{color:"#ff6b6b",fontSize:12,marginTop:4}}>⚠ Please specify.</p>}</div>}
          </Field>
          <div className="grid-2" style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:20}}>
            <Field label="5. Years of Experience" hasError={errors["A.yearsExperience"]}><Radio name="exp" options={["Less than 1 year","1–3 years","4–6 years","Above 6 years"]} value={data.A.yearsExperience} onChange={v=>upA("yearsExperience",v)} inline={false} hasError={errors["A.yearsExperience"]} accent={SECTIONS.A.accent}/></Field>
            <Field label="6. Type of Hotel" hasError={errors["A.hotelType"]}><Radio name="hotel" options={["Budget","Mid-range","Luxury"]} value={data.A.hotelType} onChange={v=>upA("hotelType",v)} inline={false} hasError={errors["A.hotelType"]} accent={SECTIONS.A.accent}/></Field>
          </div>
          <div className="grid-2" style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:20}}>
            <Field label="7. Work Schedule" hasError={errors["A.workSchedule"]}><Radio name="sched" options={["Full-time","Shift-based","Part-time"]} value={data.A.workSchedule} onChange={v=>upA("workSchedule",v)} inline={false} hasError={errors["A.workSchedule"]} accent={SECTIONS.A.accent}/></Field>
            <Field label="8. Received formal food safety training?" hasError={errors["A.formalTraining"]}><Radio name="train" options={["Yes","No"]} value={data.A.formalTraining} onChange={v=>upA("formalTraining",v)} hasError={errors["A.formalTraining"]} accent={SECTIONS.A.accent}/></Field>
          </div>
          {data.A.formalTraining==="Yes"&&<Field label="9. How recent was the training?" hasError={errors["A.trainingRecency"]}><Radio name="recency" options={["<1 year","1–3 years",">3 years"]} value={data.A.trainingRecency} onChange={v=>upA("trainingRecency",v)} hasError={errors["A.trainingRecency"]} accent={SECTIONS.A.accent}/></Field>}
          <div className="grid-2" style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:20}}>
            <Field label="10. Hotel has written food safety guidelines?" hasError={errors["A.writtenGuidelines"]}><Radio name="guide" options={["Yes","No","Not sure"]} value={data.A.writtenGuidelines} onChange={v=>upA("writtenGuidelines",v)} hasError={errors["A.writtenGuidelines"]} accent={SECTIONS.A.accent}/></Field>
            <Field label="11. Handle food directly as part of your job?" hasError={errors["A.handleFood"]}><Radio name="hfood" options={["Yes","No"]} value={data.A.handleFood} onChange={v=>upA("handleFood",v)} hasError={errors["A.handleFood"]} accent={SECTIONS.A.accent}/></Field>
          </div>
        </Card>

        {/* ── SECTION B ── */}
        <Card section="B" hasErrors={secErr("B")}>
          <Field label="1. Do you use social media?" hasError={errors["B.useSocialMedia"]}><Radio name="useSM" options={["Yes","No"]} value={data.B.useSocialMedia} onChange={v=>upB("useSocialMedia",v)} hasError={errors["B.useSocialMedia"]} accent={SECTIONS.B.accent}/></Field>
          <Field label="2. Which platforms do you use?" hasError={errors["B.platforms"]}><Checks options={["WhatsApp","Facebook","Instagram","TikTok","YouTube","X (Twitter)","Others"]} selected={data.B.platforms} onChange={v=>upB("platforms",v)} hasError={errors["B.platforms"]} accent={SECTIONS.B.accent}/></Field>
          <div className="grid-2" style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:20}}>
            <Field label="3. How often do you use social media?" hasError={errors["B.frequency"]}><Radio name="smfreq" options={["Daily","Several times/week","Weekly","Rarely"]} value={data.B.frequency} onChange={v=>upB("frequency",v)} inline={false} hasError={errors["B.frequency"]} accent={SECTIONS.B.accent}/></Field>
            <Field label="4. Average daily time on social media?" hasError={errors["B.dailyTime"]}><Radio name="smtime" options={["<30 min","30–60 min","1–2 hrs",">2 hrs"]} value={data.B.dailyTime} onChange={v=>upB("dailyTime",v)} inline={false} hasError={errors["B.dailyTime"]} accent={SECTIONS.B.accent}/></Field>
          </div>
          {[["5. Access social media during work breaks?","duringBreaks",["Yes","No"]],["6. Follow food-related pages/accounts?","followFoodPages",["Yes","No"]],["7. Follow chefs or food influencers?","followInfluencers",["Yes","No"]],["8. Seen food safety or hygiene content online?","seenFoodSafety",["Yes","No"]]].map(([label,key,opts])=>(
            <Field key={key} label={label} hasError={errors[`B.${key}`]}><Radio name={key} options={opts} value={data.B[key]} onChange={v=>upB(key,v)} hasError={errors[`B.${key}`]} accent={SECTIONS.B.accent}/></Field>
          ))}
          <Field label="9. How often do you see food safety content?" hasError={errors["B.frequencyFoodSafety"]}><Radio name="fsfreq" options={["Often","Sometimes","Rarely","Never"]} value={data.B.frequencyFoodSafety} onChange={v=>upB("frequencyFoodSafety",v)} hasError={errors["B.frequencyFoodSafety"]} accent={SECTIONS.B.accent}/></Field>
          <Field label="10. What format do you see most?" hasError={errors["B.contentFormat"]}><Radio name="fmt" options={["Videos","Images","Text","Live demonstrations"]} value={data.B.contentFormat} onChange={v=>upB("contentFormat",v)} hasError={errors["B.contentFormat"]} accent={SECTIONS.B.accent}/></Field>
          {[["11. Intentionally search for food safety info online?","searchFoodSafety",["Yes","No"]],["12. Saved or shared food safety posts?","savedShared",["Yes","No"]],["13. Trust food safety info from social media?","trustInfo",["Yes","No","Not sure"]],["14. Prefer social media over formal training for food tips?","preferSocialMedia",["Yes","No"]]].map(([label,key,opts])=>(
            <Field key={key} label={label} hasError={errors[`B.${key}`]}><Radio name={key} options={opts} value={data.B[key]} onChange={v=>upB(key,v)} hasError={errors[`B.${key}`]} accent={SECTIONS.B.accent}/></Field>
          ))}
        </Card>

        {/* ── SECTION C ── */}
        <Card section="C" hasErrors={secErr("C")}>
          {[["c1","1. My hotel follows HACCP or other food safety guidelines."],["c2","2. Regular food safety training is conducted."],["c3","3. We respond to online complaints about food hygiene."],["c4","4. Food handlers use gloves, aprons, and hairnets consistently."],["c5","5. Social media has improved our food handling culture."],["c6","6. We keep perishable food at correct temperatures."],["c7","7. Raw and cooked foods are kept separate."],["c8","8. We sanitize workspace and wash hands regularly."]].map(([k,label])=>(
            <Field key={k} label={label} hasError={errors[`C.${k}`]}><Radio name={k} options={["Yes","No","Not sure"]} value={data.C[k]} onChange={v=>upC(k,v)} hasError={errors[`C.${k}`]} accent={SECTIONS.C.accent}/></Field>
          ))}
        </Card>

        {/* ── SECTION D ── */}
        <Card section="D" hasErrors={secErr("D")}>
          <Likert questions={dLikert} values={Object.values(data.D)} onChange={(i,v)=>upL("D",i,v)} scale={L4} accent={SECTIONS.D.accent} errors={errors} pfx="D.d"/>
        </Card>

        {/* ── SECTION E ── */}
        <Card section="E" hasErrors={secErr("E")}>
          <Likert questions={eLikert} values={Object.values(data.E)} onChange={(i,v)=>upL("E",i,v)} scale={L4} accent={SECTIONS.E.accent} errors={errors} pfx="E.e"/>
        </Card>

        {/* ── SECTION F ── */}
        <Card section="F" hasErrors={secErr("F")}>
          {[["f1","1. Poor internet access limits my use of social media."],["f2","2. Cost of data is a challenge."],["f3","3. There is too much conflicting food safety information online."],["f4","4. It is difficult to identify reliable food safety sources online."],["f5","5. Lack of time limits my use of social media for learning."],["f6","6. Language barriers affect my understanding of online content."],["f7","7. Some online content promotes unsafe food practices."],["f8","8. Lack of management support discourages use of social media for learning."],["f9","9. It is difficult to apply online information in real kitchen situations."]].map(([k,label])=>(
            <Field key={k} label={label} hasError={errors[`F.${k}`]}><Radio name={k} options={["Yes","No"]} value={data.F[k]} onChange={v=>upF(k,v)} hasError={errors[`F.${k}`]} accent={SECTIONS.F.accent}/></Field>
          ))}
        </Card>

        {/* ── SECTION G ── */}
        <Card section="G" hasErrors={secErr("G")}>
          <Likert questions={gLikert} values={Object.values(data.G)} onChange={(i,v)=>upL("G",i,v)} scale={["SA","A","D","SD"]} accent={SECTIONS.G.accent} errors={errors} pfx="G.g"/>
        </Card>

        {/* SUBMIT */}
        <div style={{textAlign:"center",marginTop:16,marginBottom:48}}>
          {tried&&errCount>0&&<p style={{color:"#ff6b6b",fontSize:13,marginBottom:16}}>⚠ {errCount} question{errCount!==1?"s":""} still unanswered — scroll up to complete highlighted fields.</p>}
          <button onClick={handleSubmit} disabled={saveStatus==="saving"}
            style={{background:saveStatus==="saving"?"#2a3a2a":"linear-gradient(135deg,#52b788,#2d6a4f)",color:"#fff",border:"none",padding:"16px 60px",borderRadius:50,fontSize:16,fontWeight:600,cursor:saveStatus==="saving"?"wait":"pointer",letterSpacing:1,boxShadow:"0 4px 20px #52b78850",fontFamily:"'DM Sans',sans-serif",transition:"transform 0.2s"}}
            onMouseEnter={e=>{if(saveStatus!=="saving")e.currentTarget.style.transform="scale(1.04)";}}
            onMouseLeave={e=>e.currentTarget.style.transform="scale(1)"}>
            {saveStatus==="saving"?"⏳ Saving to Google Sheets…":"Submit Response"}
          </button>
          <p style={{color:"#607080",fontSize:12,marginTop:12}}>All questions marked <span style={{color:"#ff6b6b"}}>*</span> are required.</p>
        </div>
      </div>

      <div style={{textAlign:"center",padding:"24px",color:"#304050",fontSize:12}}>
        Food Safety Research Questionnaire · FUNAAB · Department of Hospitality and Tourism Management
      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
</body>
</html>
